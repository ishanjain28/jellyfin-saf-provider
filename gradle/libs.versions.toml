composeBom = "2026.05.00"
okhttp = "5.3.2"
moshi = "1.15.2"
jellyfinSdk = "1.8.8"
kotlinxSerializationJson = "1.11.0"
kotlinxCoroutinesAndroid = "1.11.0"
slf4jAndroid = "1.7.36"
slf4jApi = "1.7.36"

[libraries]
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }
